name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    name: Check CLA
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/ttatsato/usage-gate/blob/main/CLA.md
          branch: cla-signatures
          allowlist: ttatsato,dependabot[bot],github-actions[bot]
