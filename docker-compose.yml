services:
  postgres:
    image: postgres:17
    container_name: usage-gate-db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usage_gate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usage_gate}
      POSTGRES_DB: ${POSTGRES_DB:-usage_gate}
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    container_name: usage-gate-valkey
    ports:
      - "${VALKEY_PORT:-6380}:6379"
    volumes:
      - valkeydata:/data

volumes:
  pgdata:
  valkeydata:
